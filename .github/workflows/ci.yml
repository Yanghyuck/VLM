name: CI

on:
  push:
    branches: [main, claude, local-vlm-train]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          # Lightweight deps for unit tests (no torch / transformers needed)
          pip install "pydantic>=2.0" "pytest>=8.0" "pytest-asyncio>=1.0" \
                      "mysql-connector-python>=8.0" \
                      "fastapi>=0.110" "uvicorn>=0.29" \
                      "slowapi>=0.1.9" "python-json-logger>=2.0"

      - name: Setup config.json
        run: cp config.example.json config.json

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            *.log
